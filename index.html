<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verses — Daily Scripture</title>
  <meta name="description" content="A moment of stillness. A new scripture revealed each visit." />
  <meta name="theme-color" content="#21111f" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Verses" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Verses — Daily Scripture" />
  <meta property="og:description" content="A moment of stillness. A new scripture revealed each visit." />
  <meta property="og:url" content="https://vurtal248.github.io/verses/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Verses — Daily Scripture" />
  <meta name="twitter:description" content="A moment of stillness. A new scripture revealed each visit." />

  <!-- Fonts: EB Garamond (display) + DM Sans (UI) — preconnect first -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Page loader — cinematic entrance overlay -->
  <div class="page-loader" id="pageLoader" aria-hidden="true">
    <svg class="loader-ornament" viewBox="0 0 48 48" fill="none" aria-hidden="true" focusable="false">
      <circle cx="24" cy="24" r="16" stroke="currentColor" stroke-opacity="0.18" stroke-width="0.5" />
      <circle cx="24" cy="24" r="8" stroke="currentColor" stroke-opacity="0.28" stroke-width="0.6" />
      <circle cx="24" cy="24" r="2" fill="currentColor" fill-opacity="0.35" />
      <line x1="24" y1="4" x2="24" y2="18" stroke="currentColor" stroke-opacity="0.12" stroke-width="0.5" />
      <line x1="24" y1="30" x2="24" y2="44" stroke="currentColor" stroke-opacity="0.12" stroke-width="0.5" />
      <line x1="4" y1="24" x2="18" y2="24" stroke="currentColor" stroke-opacity="0.12" stroke-width="0.5" />
      <line x1="30" y1="24" x2="44" y2="24" stroke="currentColor" stroke-opacity="0.12" stroke-width="0.5" />
    </svg>
  </div>

  <!-- Crepuscular god-ray canvas -->
  <canvas class="canvas-rays" id="canvasRays" aria-hidden="true"></canvas>

  <!-- Ambient floating particles -->
  <div class="particles" id="particles" aria-hidden="true"></div>

  <!-- Subtle grid overlay -->
  <div class="grid-overlay" aria-hidden="true"></div>

  <main class="page-shell">
    <section class="hero" aria-label="Daily verse display">

      <!-- Reading plan progress bar (bottom edge of card) -->
      <div
        class="plan-progress-track"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        aria-label="Reading plan progress"
      >
        <div class="plan-progress-bar" id="planProgressBar"></div>
      </div>

      <!-- Top meta row: plan chip + time indicator -->
      <header class="card-meta" aria-label="Verse controls header">
        <button
          class="plan-chip"
          id="planChip"
          aria-haspopup="true"
          aria-expanded="false"
          aria-label="Reading plans"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          Plans
        </button>

        <!-- Plan selection popover -->
        <div class="plan-menu" id="planMenu" role="menu" aria-label="Select a reading plan" inert>
          <p class="plan-menu__heading" role="presentation">Reading Plans</p>
          <button class="plan-menu__item" data-plan="psalms-7" role="menuitem">
            <span class="plan-menu__label">Psalms</span>
            <span class="plan-menu__sub">7-day</span>
          </button>
          <button class="plan-menu__item" data-plan="proverbs-7" role="menuitem">
            <span class="plan-menu__label">Proverbs</span>
            <span class="plan-menu__sub">7-day</span>
          </button>
          <button class="plan-menu__item plan-menu__item--clear" data-plan="none" role="menuitem">
            Random verses
          </button>
        </div>

        <span class="time-indicator" id="timeIndicator" aria-hidden="true" title="Current sky">✦</span>
      </header>

      <!-- 3D-tilt card -->
      <article
        class="verse-card"
        id="verseCard"
        aria-live="polite"
        aria-atomic="true"
        style="opacity:0; transform: translateY(36px) scale(0.98);"
      >

        <!-- Mouse-tracking inner spotlight -->
        <div class="card-spotlight" aria-hidden="true"></div>

        <!-- Top ornamental rule -->
        <svg class="ornament" viewBox="0 0 220 14" aria-hidden="true" focusable="false">
          <line x1="0" y1="7" x2="84" y2="7" stroke="currentColor" stroke-opacity="0.18" stroke-width="0.5" />
          <circle cx="90" cy="7" r="1.6" fill="currentColor" fill-opacity="0.32" />
          <circle cx="100" cy="7" r="1" fill="none" stroke="currentColor" stroke-opacity="0.35" stroke-width="0.8" />
          <circle cx="110" cy="7" r="2.8" fill="none" stroke="currentColor" stroke-opacity="0.22" stroke-width="0.6" />
          <circle cx="120" cy="7" r="1" fill="none" stroke="currentColor" stroke-opacity="0.35" stroke-width="0.8" />
          <circle cx="130" cy="7" r="1.6" fill="currentColor" fill-opacity="0.32" />
          <line x1="136" y1="7" x2="220" y2="7" stroke="currentColor" stroke-opacity="0.18" stroke-width="0.5" />
        </svg>

        <p class="eyebrow">Daily Scripture</p>

        <!-- Two-part reference: book name + chapter:verse -->
        <div class="verse-ref" id="verseRef">
          <span class="verse-ref__book" id="verseBook" aria-label="Book name">·</span>
          <span class="verse-ref__num" id="verseNum" aria-label="Chapter and verse">··:··</span>
        </div>

        <!-- Animated divider rule -->
        <div class="verse-rule" aria-hidden="true">
          <span class="verse-rule__line"></span>
        </div>

        <!-- Verse content -->
        <blockquote class="verse-text" id="verse-content" lang="en">
          <!-- Words injected by JS with staggered animation -->
        </blockquote>

        <!-- Action buttons -->
        <nav class="card-actions" aria-label="Verse controls">

          <!-- History prev -->
          <button class="mag-btn mag-btn--ghost" id="historyPrev"
            aria-label="Previous verse" disabled data-magnetic>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>

          <button class="mag-btn" id="refreshBtn" aria-label="Reveal a new verse" data-magnetic>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-3.18-6.84" />
              <polyline points="21 3 21 8 16 8" />
            </svg>
          </button>

          <button class="mag-btn mag-btn--center" id="themeBtn" aria-label="Change sky theme" data-magnetic>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path
                d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M17.66 17.66l1.42 1.42M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
            </svg>
          </button>

          <button class="mag-btn" id="contextBtn" aria-label="Show surrounding context" data-magnetic>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
            </svg>
          </button>

          <button class="mag-btn" id="bookmarkBtn"
            aria-label="Add to collection" aria-pressed="false" data-magnetic>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
          </button>

          <button class="mag-btn" id="shareBtn" aria-label="Share this verse" data-magnetic>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
              <polyline points="16 6 12 2 8 6" />
              <line x1="12" y1="2" x2="12" y2="15" />
            </svg>
          </button>

          <!-- History next -->
          <button class="mag-btn mag-btn--ghost" id="historyNext"
            aria-label="Next verse" disabled data-magnetic>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>

        </nav>

        <!-- History dot indicator -->
        <div class="history-dots" id="historyDots" aria-label="Verse history" role="status"></div>

        <!-- Bottom ornamental rule -->
        <svg class="ornament ornament--sm" viewBox="0 0 120 10" aria-hidden="true" focusable="false">
          <line x1="0" y1="5" x2="46" y2="5" stroke="currentColor" stroke-opacity="0.13" stroke-width="0.5" />
          <circle cx="52" cy="5" r="1.2" fill="currentColor" fill-opacity="0.22" />
          <circle cx="60" cy="5" r="2" fill="none" stroke="currentColor" stroke-opacity="0.18" stroke-width="0.5" />
          <circle cx="68" cy="5" r="1.2" fill="currentColor" fill-opacity="0.22" />
          <line x1="74" y1="5" x2="120" y2="5" stroke="currentColor" stroke-opacity="0.13" stroke-width="0.5" />
        </svg>

      </article>

      <!-- Collection / favorites trigger (floating pill, outside card) -->
      <button class="fav-trigger" id="favTrigger" aria-label="Open saved verses collection">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        Collection
      </button>

    </section>
  </main>

  <!-- Favorites Drawer -->
  <div
    class="favorites-drawer"
    id="favoritesDrawer"
    role="dialog"
    aria-modal="true"
    aria-label="Saved verses collection"
    aria-hidden="true"
    inert
  >
    <div class="favorites-drawer__panel">
      <header class="favorites-drawer__header">
        <h2 class="favorites-drawer__title">Collection</h2>
        <button class="favorites-drawer__close" id="favDrawerClose" aria-label="Close collection">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </header>
      <ul class="fav-list" id="favList" aria-label="Saved verses"></ul>
    </div>
  </div>

  <!-- Noscript fallback -->
  <noscript>
    <style>
      .page-loader,.canvas-rays,.particles,.grid-overlay,.card-actions,.history-dots,.card-meta,.fav-trigger{display:none!important}
      .verse-card{opacity:1!important;transform:none!important}
      .verse-ref__num{font-size:clamp(3rem,10vw,6rem)}
    </style>
    <div style="position:fixed;inset:0;background:#21111f;display:grid;place-items:center;font-family:Georgia,serif;color:#fff6ea;text-align:center;padding:2rem;">
      <div>
        <p style="font-size:0.7rem;letter-spacing:.3em;text-transform:uppercase;opacity:.6;margin-bottom:1rem">Daily Scripture</p>
        <p style="font-size:2rem;font-style:italic;max-width:30ch;line-height:1.7">"Come to me, all you who are weary and burdened, and I will give you rest."</p>
        <p style="margin-top:1.5rem;opacity:.5;font-size:0.8rem;letter-spacing:.2em">Matthew 11:28</p>
      </div>
    </div>
  </noscript>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
